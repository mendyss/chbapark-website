<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מוקדי קריאת מגילה - שכונת הפארק באר שבע</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: linear-gradient(135deg,#ffecd2,#fcb69f);
}
header {
    text-align: center;
    padding: 20px;
    font-size: 22px;
    font-weight: bold;
}
.search-box {
    text-align:center;
    padding:10px;
}
input {
    width: 90%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    font-size:16px;
}
.tabs {
    display:flex;
    justify-content:center;
    gap:10px;
    margin:10px;
}
.tab {
    padding:10px 20px;
    border-radius:20px;
    background:white;
    cursor:pointer;
    font-weight:bold;
}
.tab.active {
    background:#ff4e50;
    color:white;
}
.card {
    background:white;
    margin:10px;
    padding:15px;
    border-radius:15px;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
}
.button {
    display:inline-block;
    padding:8px 12px;
    margin:5px 0;
    border-radius:10px;
    text-decoration:none;
    color:white;
    font-size:14px;
}
.map { background:#4285F4; }
.whatsapp { background:#25D366; }
.share { background:#075E54; width:90%; display:block; text-align:center; margin:15px auto;}
.donate { background:#e91e63; width:90%; display:block; text-align:center; margin:10px auto;}
.group { background:#4CAF50; width:90%; display:block; text-align:center; margin:10px auto;}

.popup {
    position:fixed;
    top:0;
    left:0;
    right:0;
    bottom:0;
    background:rgba(0,0,0,0.7);
    display:flex;
    justify-content:center;
    align-items:center;
}
.popup-content {
    background:white;
    padding:20px;
    border-radius:15px;
    width:85%;
    text-align:center;
}
</style>
</head>

<body>

<div class="popup" id="safetyPopup">
  <div class="popup-content">
    <h3>⚠️ הנחיות בטיחות</h3>

    במקרה של אזעקה — נכנסים מיד למרחב מוגן.<br>
    כאשר מתקבל אישור יציאה באפליקציית פיקוד העורף — חוזרים להמשך קריאת המגילה.
    </p>
    <button onclick="document.getElementById('safetyPopup').style.display='none'">הבנתי</button>
  </div>
</div>

<header>
📖 מוקדי קריאת מגילה – שכונת הפארק באר שבע 🎭
</header>

<a class="share button" href="#" onclick="sharePage()">📲 שתפו את הדף בווטסאפ</a>
<a class="group button" href="https://chat.whatsapp.com/L0iEHd5FZLt73BCRHK4mCI" target="_blank">📢 הצטרפו לקבוצת העדכונים</a>

<a class="donate button" href="https://pay.grow.link/ac8d37dc20792b91f0ec3c1f57f3ee9f-MzExMTM2NA" target="_blank">💰 מחצית השקל</a>
<a class="donate button" href="https://app.icount.co.il/m/2efaa" target="_blank">🎁 מתנות לאביונים</a>
<a class="donate button" href="https://app.icount.co.il/m/104dc/c9316p142u69a54ec80?utm_source=iCount&utm_medium=paypage&utm_campaign=322" target="_blank">❤️ תרומה כללית לבית חב"ד</a>

<div class="search-box">
<input type="text" id="search" placeholder="חיפוש לפי רחוב..." onkeyup="renderCards()">
</div>

<div class="tabs">
<div class="tab active" onclick="setTab('לילה')">🌙 לילה</div>
<div class="tab" onclick="setTab('יום')">☀️ יום</div>
</div>

<div id="cards"></div>

<script>

let currentTab = "לילה";

const data = [
{street:"נחל שילה", building:"17", time:"18:00", host:"רויטל יעקב", phone:"0547930040", reader:"-", type:"לילה"},
{street:"נחל קדרון", building:"44-46", time:"18:00", host:"רחלי נועה שמילו", phone:"0526144418", reader:"-", type:"לילה"},
{street:"נחל פרת", building:"22", time:"18:00", host:"אוריאל", phone:"0508181241", reader:"-", type:"לילה"},
{street:"נחל קדרון", building:"26", time:"18:00", host:"שחר פחימה", phone:"0526267527", reader:"-", type:"לילה"},
{street:"נחל ערוגות", building:"11", time:"19:00", host:"אוריאל יוספי", phone:"0507727005", reader:"-", type:"לילה"},
{street:"נחל משמר", building:"66", time:"19:00", host:"הילה טויזר", phone:"0508505375", reader:"-", type:"לילה"},
{street:"נחל לבן", building:"12", time:"19:00", host:"ירדן שושן", phone:"0542571030", reader:"-", type:"לילה"},
{street:"נחל חבר", building:"13", time:"19:00", host:"דניאלה", phone:"0542291701", reader:"-", type:"לילה"},

{street:"נחל משמר", building:"62", time:"10:00", host:"עמית אבוחצירה", phone:"0504799199", reader:"-", type:"יום"},
{street:"נחל דליות", building:"15", time:"10:00", host:"שירן אבוחצירה", phone:"0504666071", reader:"-", type:"יום"},
{street:"נחל פרת", building:"26", time:"10:00", host:"נועם לחיאני", phone:"0524323541", reader:"-", type:"יום"},
{street:"נחל פרס", building:"13-17", time:"11:00", host:"יאנה ונגר", phone:"0546250304", reader:"-", type:"יום"},
{street:"נחל קדרון", building:"35", time:"11:00", host:"דודו", phone:"0524069993", reader:"-", type:"יום"},
{street:"נחל דליות", building:"22-24", time:"11:00", host:"מיכל אלחדד", phone:"0542061517", reader:"-", type:"יום"},
{street:"נחל פרת", building:"10", time:"12:00", host:"הדר זגורי", phone:"0507141450", reader:"-", type:"יום"},
{street:"נחל קדרון", building:"20", time:"12:00", host:"דניאלה תורגמן", phone:"0585222374", reader:"-", type:"יום"}
];

function setTab(type){
    currentTab = type;
    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
    event.target.classList.add("active");
    renderCards();
}

function renderCards(){
    const search = document.getElementById("search").value;
    const container = document.getElementById("cards");
    container.innerHTML="";
    
    data
    .filter(item=> item.type===currentTab)
    .filter(item=> item.street.includes(search))
    .forEach(item=>{
        container.innerHTML+=`
        <div class="card">
            <h3>${item.street} ${item.building}</h3>
            <p>⏰ שעה: ${item.time}</p>
            <p>👤 מארח: ${item.host}</p>
            <a class="button map" target="_blank"
            href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(item.street+" "+item.building+" באר שבע")}">
            🧭 ניווט</a>
            <a class="button whatsapp" target="_blank"
            href="https://wa.me/972${item.phone.substring(1)}">
            💬 וואטסאפ</a>
        </div>`;
    });
}

function sharePage(){
    const url = window.location.href;
    window.open("https://wa.me/?text="+encodeURIComponent("מוקדי קריאת מגילה בשכונת הפארק:\n"+url));
}

renderCards();

</script>
</body>
</html>
